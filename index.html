<!DOCTYPE html>
<html lang="te">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KSR Version L.3 Phase 2 - Login Fix</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="header"><div class="wrap top"><div><div class="brand">KSR Online Exam Platform</div><div class="sub">Version L.3 Phase 2 - Login Fix</div></div><a style="color:white;font-weight:900" href="admin.html">Admin</a></div></div>
<div class="wrap">
  <div id="login" class="card">
    <h2>Student Login</h2>
    <div class="grid"><div><label>Name</label><input id="stName" placeholder="Student name"></div><div><label>Phone</label><input id="stPhone" placeholder="Phone number"></div></div>
    <div class="grid"><div><label>Exam ID</label><input id="stExamId" placeholder="DSC001"></div><div><label>Exam Code</label><input id="stCode" placeholder="Exam code"></div></div>
    <button class="p" id="startBtn">Start Exam</button><button class="s" id="hallBtn">Hall Ticket</button><p id="loginMsg" class="small"></p>
  </div>
  <div id="exam" class="hide">
    <div class="card top"><div><b id="examTitle"></b><br><span id="prog" class="small"></span></div><span id="timer" class="timer">00:00</span></div>
    <div class="card" id="qcard"></div>
    <div class="card top"><button class="s" id="prevBtn">Previous</button><button class="o" id="markBtn">Mark</button><button class="p" id="nextBtn">Next</button><button class="d" id="submitBtn">Submit</button></div>
    <div class="card"><b>Palette</b><div id="palette" class="pal"></div></div>
  </div>
  <div id="result" class="card hide"></div>
</div>
<script type="module" src="student.js?v=l3p2fix2"></script>
</body></html>
