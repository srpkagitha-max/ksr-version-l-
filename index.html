 <!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>KSR Version L Student</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <div class="wrap top">
      <div>
        <div class="brand" id="mainTitle">KSR Online Exam Platform</div>
        <div class="sub" id="mainSub">Version L Phase 1 - Student Portal</div>
      </div>
      <a style="color:white;font-weight:900" href="admin.html">Admin</a>
    </div>
  </div>

  <div class="wrap">
    <div id="login" class="card">
      <h2>Student Login</h2>

      <div class="grid">
        <div>
          <label>Name</label>
          <input id="stName">
        </div>
        <div>
          <label>Phone</label>
          <input id="stPhone">
        </div>
      </div>

      <div class="grid">
        <div>
          <label>Exam ID</label>
          <input id="stExamId">
        </div>
        <div>
          <label>Exam Code</label>
          <input id="stCode">
        </div>
      </div>

      <button class="p" id="startBtn">Start Exam</button>
      <button class="s" id="hallBtn">Hall Ticket</button>
      <p id="loginMsg" class="small"></p>
